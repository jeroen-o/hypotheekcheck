function annML(P, r, n) {
  if (!P || !n) return 0;
  const rm = r / 100 / 12,
    nm = n * 12;
  if (rm === 0) return P / nm;
  return P * rm * Math.pow(1 + rm, nm) / (Math.pow(1 + rm, nm) - 1);
}
function linML(P, n, r, betaaldJaar) {
  const rm = r / 100 / 12;
  const rs = Math.max(0, P - P / (n * 12) * betaaldJaar * 12);
  return P / (n * 12) + rs * rm;
}
function rs(P, r, n, betaald, type = "ann") {
  if (P <= 0 || n <= 0) return 0;
  if (type === "aflvrij") return P; // schuld blijft identiek
  const nm = n * 12,
    bm = betaald * 12;
  if (type === "lin") return Math.max(0, P - P / nm * bm); // lineaire aflossing
  // Annuïteit (default): restschuld na bm maanden
  const rm = r / 100 / 12;
  if (rm === 0) return Math.max(0, P - P / nm * bm);
  const mL = annML(P, r, n);
  return Math.max(0, P * Math.pow(1 + rm, bm) - mL * ((Math.pow(1 + rm, bm) - 1) / rm));
}
function totRente(P, r, n, type) {
  const nm = n * 12;
  if (type === "lin") {
    const mA = P / nm;
    let rnt = 0,
      rest = P;
    for (let i = 0; i < nm; i++) {
      rnt += rest * (r / 100 / 12);
      rest -= mA;
    }
    return rnt;
  }
  return annML(P, r, n) * nm - P;
}
function extraAflosSim(P, r, n, extra) {
  const rm = r / 100 / 12,
    mL = annML(P, r, n);
  let rest = P,
    maanden = 0,
    rnt = 0;
  while (rest > 0.01 && maanden < n * 12 * 2) {
    const rd = rest * rm;
    const ad = mL - rd + extra;
    rnt += rd;
    rest -= ad;
    maanden++;
  }
  return {
    maanden,
    rnt
  };
}
