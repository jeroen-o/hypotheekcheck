// ─── MATH ─────────────────────────────────────────────────────────────────────
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const € = (v,d=0) => new Intl.NumberFormat("nl-NL",{style:"currency",currency:"EUR",maximumFractionDigits:d}).format(v||0);
const pct = (v,d=1) => `${Number(v||0).toFixed(d)}%`;

function annML(P,r,n){ if(!P||!n) return 0; const rm=r/100/12,nm=n*12; if(rm===0) return P/nm; return(P*rm*Math.pow(1+rm,nm))/(Math.pow(1+rm,nm)-1); }
function linML(P,n,r,betaaldJaar){ const rm=r/100/12; const rs=Math.max(0,P-(P/(n*12))*betaaldJaar*12); return P/(n*12)+rs*rm; }
function rs(P,r,n,betaald){ if(P<=0||n<=0) return 0; const rm=r/100/12,bm=betaald*12,nm=n*12; if(rm===0) return Math.max(0,P-(P/nm)*bm); const mL=annML(P,r,n); return Math.max(0,P*Math.pow(1+rm,bm)-mL*((Math.pow(1+rm,bm)-1)/rm)); }
function totRente(P,r,n,type){ const nm=n*12; if(type==="lin"){ const mA=P/nm; let rnt=0,rest=P; for(let i=0;i<nm;i++){rnt+=rest*(r/100/12);rest-=mA;} return rnt; } return annML(P,r,n)*nm-P; }
function extraAflosSim(P,r,n,extra){ const rm=r/100/12,mL=annML(P,r,n); let rest=P,maanden=0,rnt=0; while(rest>0.01&&maanden<n*12*2){const rd=rest*rm;const ad=mL-rd+extra;rnt+=rd;rest-=ad;maanden++;} return{maanden,rnt}; }

// Simplified Dutch net income 2025
function nettoInkomen(bruto){
  const hk = Math.min(Math.max(0, bruto*0.028 + 821), 5454); // arbeidskorting approx
  const ahk = Math.max(0, 3362 - Math.max(0,(bruto-24813)*0.06));
  let belasting = 0;
  if(bruto<=38441) belasting=bruto*0.3582;
  else if(bruto<=75518) belasting=38441*0.3582+(bruto-38441)*0.3748;
  else belasting=38441*0.3582+(75518-38441)*0.3748+(bruto-75518)*0.495;
  return Math.max(0, bruto-belasting+hk+ahk);
}

// Eigenwoningforfait 2025
function ewf(wozWaarde, heeftHypotheek){
  if(wozWaarde<=12500) return 0;
  const base = wozWaarde<=75000 ? wozWaarde*0.0012 : wozWaarde<=1310000 ? wozWaarde*0.0035 : wozWaarde*0.0235;
  // Wet Hillen: als rente < EWF, dan bijtelling. Als geen hypotheek: volledig bijtelling
  return base;
}

// Box 3 belasting 2025 (forfaitair: 6.17% rendement, 36% belasting = effectief 2.22%)
function box3Belasting(vermogen, fiscaalPartner){
  const vrijstelling = fiscaalPartner ? 114000 : 57000;
  const belastbaarVermogen = Math.max(0, vermogen - vrijstelling);
  return belastbaarVermogen * 0.0217; // effectief tarief ~2.17%
}

// ─── ATOMS ───────────────────────────────────────────────────────────────────
const Badge = ({ok,lo,lno}) => <span style={{background:ok?C.greenDim:C.redDim,color:ok?C.green:C.red,borderRadius:20,padding:"3px 11px",fontSize:11,fontWeight:600,letterSpacing:0.4,whiteSpace:"nowrap"}}>{ok?(lo||"✓ OK"):(lno||"✗ Risico")}</span>;
const Bar = ({value,max=100,t=[35,50]}) => { const p=clamp((value/max)*100,0,100),color=value>t[1]?C.red:value>t[0]?C.yellow:C.green; return <div style={{background:C.s3,borderRadius:6,height:7,overflow:"hidden",marginTop:7}}><div style={{width:`${p}%`,height:"100%",background:color,borderRadius:6,transition:"width .5s ease"}}/></div>; };

function Field({label,value,onChange,pre,suf,step="1",hint,min,max}){
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <label style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase"}}>{label}</label>
    <div style={{display:"flex",alignItems:"center",background:C.s2,border:`1px solid ${C.border}`,borderRadius:8}}>
      {pre&&<span style={{padding:"0 9px",color:C.muted,fontSize:13,flexShrink:0}}>{pre}</span>}
      <input type="number" value={value} step={step} min={min} max={max}
        onChange={e=>onChange(e.target.value===""?"":parseFloat(e.target.value))}
        style={{flex:1,background:"transparent",border:"none",outline:"none",color:C.text,padding:"9px",fontSize:14,fontFamily:"inherit",minWidth:0}}/>
      {suf&&<span style={{padding:"0 9px",color:C.muted,fontSize:13,flexShrink:0}}>{suf}</span>}
    </div>
    {hint&&<span style={{fontSize:10,color:C.muted}}>{hint}</span>}
  </div>;
}

function Sel({label,value,onChange,opts,hint}){
  return <div style={{display:"flex",flexDirection:"column",gap:4}}>
    <label style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase"}}>{label}</label>
    <div style={{position:"relative"}}>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"9px 32px 9px 9px",fontSize:14,fontFamily:"inherit",cursor:"pointer"}}>
        {opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}

      <span style={{position:"absolute",right:9,top:"50%",transform:"translateY(-50%)",color:C.muted,pointerEvents:"none",fontSize:10}}>▼</span>

}

function Toggle({value,onChange,opts}){

function Sec({title,children,delay=0}){

}

function G({cols="repeat(auto-fit,minmax(155px,1fr))",gap=13,children}){ return <div style={{display:"grid",gridTemplateColumns:cols,gap}}>{children}</div>; }

function Row({label,value,accent,bold,sub}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
    <span style={{fontSize:12,color:C.sub}}>{label}</span>

}

function KPI({label,value,sub,color=C.gold,small}){

    {sub&&<div style={{fontSize:10,color:C.muted,marginTop:2}}>{sub}</div>}

}

function Alert({type="info",children}){
  const m={ok:[C.greenDim,C.green,"✅"],warn:[C.yellowDim,C.yellow,"⚠️"],bad:[C.redDim,C.red,"🚨"],info:[C.blueDim,C.blue,"💡"]};
  const[bg,clr,ico]=m[type];
  return <div style={{background:bg,border:`1px solid ${clr}30`,borderRadius:9,padding:"10px 13px",fontSize:12,color:clr,lineHeight:1.7,marginTop:11}}>{ico} {children}</div>;
}

function ScCard({icon,title,accent=C.blue,children,delay=0}){

function WQ({value,label="Woonquote",ok,t=[38,50]}){

}

// Priority matrix badge
function Prio({level}){
  const map={kritiek:[C.red,"Kritiek"],hoog:[C.orange,"Hoog"],middel:[C.yellow,"Middel"],laag:[C.green,"Laag"]};
  const[c,l]=map[level]||[C.sub,"Onbekend"];
  return <span style={{background:`${c}22`,color:c,borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,letterSpacing:0.5}}>{l}</span>;
}

function App(){

  // Hypotheek

  const [opstal,setOpstall]=useState(600);       // opstalverzekering/jr

  // Inkomen

  const [dv1,setDv1]=useState("vast");
  const [dv2,setDv2]=useState("vast");

  // Verzekeringen

  // Buffer & vermogen
  const [spaar,setSpaar]=useState(25000);

  // Gezin
  const [kinderen,setKinderen]=useState(0);

  const [kindLeeftijd,setKindLeeftijd]=useState(8);
  const [studBijdrage,setStudBijdrage]=useState(500);

  // Woning extra
  const [energieLabel,setEnergieLabel]=useState("C");
  const [klimaatzone,setKlimaatzone]=useState("geen");
  const [dubbeleLasten,setDubbeleLasten]=useState(0);
  const [overbrug,setOverbrug]=useState(0);

  // Scenario instellingen
  const [minderPct,setMinderPct]=useState(20);

  const [nieuweRente,setNieuweRente]=useState(5.5);
  const [stressRente,setStressRente]=useState(8.0);
  const [wwMnd,setWwMnd]=useState(18);
  const [wwPct,setWwPct]=useState(75);
  const [wwdaling,setWwdaling]=useState(15);
  const [extraAflospm,setExtraAflospm]=useState(200);

  const [overslNieuweR,setOverslNieuweR]=useState(3.8);
  const [loongroei,setLoongroei]=useState(2.5);
  const [inflatie,setInflatie]=useState(3.0);

  // Externe bronnen
  const [extPostcode,setExtPostcode]=useState("1234AB");
  const [extHuisnr,setExtHuisnr]=useState("1");
  const [extLoading,setExtLoading]=useState(false);
  const [extStatus,setExtStatus]=useState("");
  const [extAiData,setExtAiData]=useState(null);
  // Klimaatcijfer (1=laag, 10=hoog risico)
  const [klimWater,setKlimWater]=useState(3);
  const [klimOverstr,setKlimOverstr]=useState(2);
  const [klimDroogte,setKlimDroogte]=useState(4);
  const [klimHitte,setKlimHitte]=useState(4);
  // Funderingscijfer
  const [fundLabel,setFundLabel]=useState("C");
  const [fundType,setFundType]=useState("beton");
  const [fundBouwjaar,setFundBouwjaar]=useState(1975);
  // Woningcijfer
  const [wonScore,setWonScore]=useState(7);
  const [wonLeef,setWonLeef]=useState(7);
  const [wonVoorz,setWonVoorz]=useState(6);
  // Hypotheekcijfer
  const [marktRente,setMarktRente]=useState(3.9);

  // ─── BEREKENINGEN ──────────────────────────────────────────────────────────
  const c = useMemo(()=>{
    // Inkomen
    const inkBruto1 = dv1==="zzp" ? zzpOmzet*0.70 : ink1; // ZZP fiscaal inkomen ~70% omzet
    const inkBruto2 = ink2;
    const inkNetto1 = nettoInkomen(inkBruto1);
    const inkNetto2 = nettoInkomen(inkBruto2);
    const inkBrutoT = inkBruto1+inkBruto2;
    const inkNettoT = inkNetto1+inkNetto2;
    const inkBrutoM = inkBrutoT/12;
    const inkNettoM = inkNettoT/12;

    // Hypotheek basis
    const annDeel = Math.max(0, hs-aflVrij);
    const rsAnn = rs(annDeel, rente, lp, betaald);
    const rsAflVrij = aflVrij; // aflossingsvrij: schuld blijft gelijk
    const rsTotaal = rsAnn + rsAflVrij - spaarkapitaal;
    const rLp = lp-betaald;
    const mLAnn = htype==="ann" ? annML(annDeel,rente,lp) : linML(annDeel,lp,rente,betaald);
    const mLAflVrij = aflVrij*(aflVrijRente/100/12); // alleen rente
    const mL = mLAnn + mLAflVrij;
    const ltv = (rsTotaal/ww)*100;
    const overwaarde = ww-rsTotaal;
    const onderhoud = ww*0.015/12;
    const nhgMog = hs<=435000&&ww<=435000&&aflVrij===0;

    // Totale woonlast
    const canonMnd = erfpacht==="ja" ? epCanon/12 : 0;
    const gemeenteMnd = gemeenteLasten/12;
    const opstalMnd = opstal/12;
    const labelKosten = {"A++":-80,"A+":-60,"A":-40,"B":-20,"C":0,"D":40,"E":80,"F":120,"G":180};
    const energieExtra = labelKosten[energieLabel]||0;
    const totWoonlast = mL+vve+canonMnd+gemeenteMnd+opstalMnd+energieExtra;
    const wqBruto = (mL/inkBrutoM)*100;
    const totWqBruto = (totWoonlast/inkBrutoM)*100;
    const totWqNetto = (totWoonlast/inkNettoM)*100;

    // Buffer
    const bufTot = spaar+beleg;
    const bufMnd = mL>0 ? bufTot/mL : 0;

    // Renteaftrek
    const renteJaar = rsTotaal*(rente/100);
    const aftrekVoordeel = renteJaar*0.3697/12;
    const nettoML = mL-aftrekVoordeel;
    const nettoWq = (nettoML/inkBrutoM)*100;

    // Eigenwoningforfait
    const ewfBedrag = ewf(wozWaarde, ink2>0);
    const ewfMaand = ewfBedrag/12;
    // Als renteaftrek < EWF: bijtelling (Wet Hillen afgebouwd 2019-2048, nu 80% voordeel)
    const renteAftrekJaar = renteJaar*0.3697;
    const hillenBijtelling = Math.max(0, ewfBedrag - renteAftrekJaar)*0.20; // 20% bijtelling nu
    const fiscaalVoordeel = renteAftrekJaar - ewfBedrag - hillenBijtelling;
    const nettoMlFiscaal = mL - fiscaalVoordeel/12;

    // Box 3 vermogen
    const vermogen = spaar+beleg;
    const box3Btg = box3Belasting(vermogen, ink2>0);
    const box3Mnd = box3Btg/12;

    // Totale rentekosten
    const totRAnn = totRente(annDeel,rente,lp,"ann");
    const totRLin = totRente(annDeel,rente,lp,"lin");

    // Netto cashflow
    const vasteLasten = totWoonlast+onderhoud;
    const kindMnd = kinderen*kindKosten;
    const netCashflow = inkNettoM - vasteLasten - kindMnd;
    const netCashflowPct = (vasteLasten/inkNettoM)*100;

    // Bonus wegval
    const inkZonderBonus = (inkBruto1-(bonusZeker==="nee"?bonus1:0)+inkBruto2)/12;
    const bonusWq = (mL/inkZonderBonus)*100;

    // Ziektewet
    const zwInk1 = inkBruto1*0.70/12;
    const zwTotM = zwInk1+inkBruto2/12;
    const zwWq = (mL/zwTotM)*100;

    // Zwangerschap (na verlof 80%)
    const zdNaInkM = (inkBruto1*0.80+inkBruto2)/12;
    const zdNaWq = (mL/zdNaInkM)*100;

    // AO
    const aoInk1 = aov==="ja" ? inkBruto1*(aovPct/100) : inkBruto1*0.70;
    const aoTotM = (aoInk1+inkBruto2)/12;
    const aoWq = (mL/aoTotM)*100;

    // Overlijden
    const rsOrv1 = Math.max(0,rsTotaal-(orv1==="ja"?orvB1:0));
    const mLOrv1 = annML(rsOrv1,rente,rLp);
    const ovlWq1 = (mLOrv1/(inkBruto2/12))*100;
    const rsOrv2 = Math.max(0,rsTotaal-(orv2==="ja"?orvB2:0));
    const mLOrv2 = annML(rsOrv2,rente,rLp);
    const ovlWq2 = (mLOrv2/(inkBruto1/12))*100;

    // ANW uitkering (nabestaanden): bruto ~€1.466/mnd (2025), alleen als geen eigen inkomen >50% minimumloon
    const anwUitkering = 1466;
    const ovlWq1MetAnw = (mLOrv1/((inkBruto2/12)+anwUitkering))*100;

    // Minder werken
    const minderInkM = inkBrutoM*(1-minderPct/100);
    const minderWq = (mL/minderInkM)*100;

    // Mantelzorg
    const mantelWq = (mL/(inkBruto1/12))*100;

    // Studie
    const jaarTotStudie = Math.max(0,18-kindLeeftijd);
    const studieKosten = kinderen*studBijdrage;
    const vrijNaStudie = inkNettoM-mL-studieKosten;

    // Pensioen
    const AOW=67;
    const jTotP = AOW-Math.min(l1,l2||l1);
    const rsPensioen = rs(annDeel,rente,lp,betaald+Math.max(0,jTotP));
    const rLpPensioen = Math.max(0,rLp-jTotP);
    const mLPensioen = rsPensioen>0 ? annML(rsPensioen,rente,rLpPensioen) : 0;
    const pensMnd = pensioenInk/12;
    const pensWq = mLPensioen>0 ? (mLPensioen/pensMnd)*100 : 0;

    // Nieuwe rente
    const rsNvp = rs(annDeel,rente,lp,rvp);
    const rLpNvp = lp-rvp;
    const mLNvp = annML(rsNvp,nieuweRente,rLpNvp)+mLAflVrij;
    const nvpWq = (mLNvp/inkBrutoM)*100;
    const nvpDelta = mLNvp-mL;

    // Stress test
    const mLStress = annML(rsAnn,stressRente,rLp)+mLAflVrij;
    const stressWq = (mLStress/inkBrutoM)*100;
    const stressDelta = mLStress-mL;

    // Inflatie / loongroei
    const inkM10 = inkBrutoM*Math.pow(1+loongroei/100,10);
    const wqOver10 = (mL/inkM10)*100;
    const reeleSchuld10 = rsTotaal/Math.pow(1+inflatie/100,10);

    // Werkloosheid
    const wwInk1 = inkBruto1*(wwPct/100)/12;
    const wwTotM = wwInk1+inkBruto2/12;
    const wwWq = (mL/wwTotM)*100;

    // Scheiding
    const schWq1 = (mL/(inkBruto1/12))*100;
    const schWq2 = inkBruto2>0 ? (mL/(inkBruto2/12))*100 : 999;

    // Woningwaardedaling
    const wwNaDaling = ww*(1-wwdaling/100);
    const ltvNaDaling = (rsTotaal/wwNaDaling)*100;
    const onderWater = rsTotaal>wwNaDaling;
    const onderwaterBij = (1-(rsTotaal/ww))*100;
    const restschuldVerkoop = Math.max(0,rsTotaal-wwNaDaling*0.93);

    // Dubbele lasten
    const totDubbel = mL+dubbeleLasten;
    const dubbelWq = (totDubbel/inkBrutoM)*100;
    const dubbelMnd = bufTot>0&&dubbeleLasten>0 ? (bufTot/totDubbel).toFixed(1) : 0;

    // Erfpacht herziening
    const canonNieuw = erfpacht==="ja" ? (epCanon*(1+epStijging/100))/12 : 0;
    const canonDelta = canonNieuw-canonMnd;
    const epWqNa = erfpacht==="ja" ? ((mL+canonNieuw)/inkBrutoM)*100 : 0;

    // Overbruggingskrediet
    const obRente = overbrug*(rente/100/12);
    const obWq = overbrug>0 ? ((mL+obRente)/inkBrutoM)*100 : wqBruto;

    // Klimaat
    const klimaatKorting={geen:0,laag:0.02,matig:0.05,hoog:0.12};
    const klimaatDaling = ww*(klimaatKorting[klimaatzone]||0);
    const ltvNaKlimaat = (rsTotaal/(ww-klimaatDaling))*100;

    // Extra aflossen
    const normaalSim = extraAflosSim(rsAnn,rente,rLp,0);
    const extraSim = extraAflospm>0 ? extraAflosSim(rsAnn,rente,rLp,extraAflospm) : null;
    const extraBesparing = extraSim ? normaalSim.rnt-extraSim.rnt : 0;
    const extraKorting = extraSim ? (normaalSim.maanden-extraSim.maanden)/12 : 0;

    // Oversluiten
    const ovslBesp = annML(rsAnn,rente,lp)-annML(rsAnn,overslNieuweR,rLp);
    const ovslTerugverdien = ovslBesp>0 ? Math.ceil(overslBoete/ovslBesp) : Infinity;
    const ovslZinvol = ovslBesp>0&&ovslTerugverdien<rLp*12*0.5;

    // Extra aflossen vs. beleggen
    const aflBreakEven = belegRendement; // breakeven rendement waarbij beleggen = aflossen
    const rendementNaBalsting = belegRendement*(1-0.3697); // rendement na belasting (vereenvoudigd)
    const aflRenteNaAftrek = rente*(1-0.3697);
    const aflVsBelegBeter = rendementNaBalsting > aflRenteNaAftrek;
    const extraPm10Belegg = (() => {
      let v = 0;
      for(let i=0;i<120;i++) v=(v+extraAflospm)*(1+belegRendement/100/12);
      return v;
    })();
    const extraPm10Aflos = extraAflospm*120+(extraBesparing*(Math.min(10,extraKorting)/Math.max(1,extraKorting)));

    // Verduurzaming
    const vdBespMnd = verduurzaming>0 ? Math.min(verduurzaming*0.007/12,250) : 0;
    const vdRoi = verduurzaming>0 ? (vdBespMnd*12/verduurzaming)*100 : 0;
    const vdTerugverdien = vdBespMnd>0 ? verduurzaming/(vdBespMnd*12) : 0;

    // Aflossingsvrij analyse
    const aflVrijRisico = aflVrij>0 && (betaald+rLp)>=lp; // nog steeds aflossingsvrij schuld aan einde
    const aflVrijLtv = aflVrij>0 ? (aflVrij/ww)*100 : 0;
    const aflVrijPct = hs>0 ? (aflVrij/hs)*100 : 0;

    // Netto cashflow waterval
    const cashflowItems = [
      {l:"Netto inkomen",v:inkNettoM,type:"plus"},
      {l:"Hypotheeklast",v:-mL,type:"min"},
      {l:"VvE + erfpacht",v:-(vve+canonMnd),type:"min"},
      {l:"Gemeentelijke lasten",v:-gemeenteMnd,type:"min"},
      {l:"Opstalverzekering",v:-opstalMnd,type:"min"},
      {l:"Energiemeerkosten",v:-energieExtra,type:energieExtra>0?"min":"plus"},
      {l:"Onderhoud (1.5%)",v:-onderhoud,type:"min"},
      {l:"Box 3 belasting",v:-box3Mnd,type:"min"},
      {l:"Kindkosten",v:-kindMnd,type:kindMnd>0?"min":"neutraal"},
      {l:"Vrij besteedbaar",v:netCashflow-box3Mnd,type:"totaal"},
    ].filter(i=>i.v!==0||i.type==="totaal");

    // Alle scenario's voor overzicht & actiepunten
    const scenarios=[
      {ico:"🩺",l:"Arbeidsongeschikt",wq:aoWq,ok:aoWq<42,prio:aoWq>55?"kritiek":aoWq>42?"hoog":"laag"},
      {ico:"💔",l:"Overlijden partner 1",wq:ovlWq1,ok:ovlWq1<42,prio:ovlWq1>60?"kritiek":ovlWq1>42?"hoog":"laag"},
      {ico:"💙",l:"Overlijden partner 2",wq:ovlWq2,ok:ovlWq2<42||inkBruto2===0,prio:ovlWq2>60?"hoog":ovlWq2>42?"middel":"laag"},
      {ico:"🤒",l:"Ziektewet 2 jaar",wq:zwWq,ok:zwWq<50,prio:zwWq>60?"hoog":"middel"},
      {ico:"🤰",l:"Zwangerschapsverlof",wq:zdNaWq,ok:zdNaWq<45,prio:zdNaWq>55?"hoog":"laag"},
      {ico:"⏰",l:`Minder werken −${minderPct}%`,wq:minderWq,ok:minderWq<42,prio:minderWq>55?"hoog":"middel"},
      {ico:"❤️",l:"Mantelzorg P2 stopt",wq:mantelWq,ok:mantelWq<42||inkBruto2===0,prio:mantelWq>55?"hoog":"middel"},
      {ico:"👶",l:"Kinderkosten",wq:null,ok:netCashflow>=200,prio:netCashflow<0?"kritiek":netCashflow<500?"hoog":"laag"},
      {ico:"🏖️",l:"Pensioen",wq:pensWq,ok:pensWq<38||rsPensioen===0,prio:pensWq>50?"hoog":"middel"},
      {ico:"📈",l:`Nieuwe rente ${nieuweRente}%`,wq:nvpWq,ok:nvpWq<42,prio:nvpDelta>400?"hoog":nvpDelta>200?"middel":"laag"},
      {ico:"🔥",l:`Rente stress ${stressRente}%`,wq:stressWq,ok:stressWq<50,prio:stressWq>65?"hoog":"middel"},
      {ico:"💼",l:"Werkloosheid WW",wq:wwWq,ok:wwWq<50,prio:(dv1==="zzp"||dv1==="flex")?"kritiek":wwWq>55?"hoog":"middel"},
      {ico:"⚖️",l:"Scheiding P1 solo",wq:schWq1,ok:schWq1<42,prio:schWq1>60?"hoog":"laag"},
      {ico:"📉",l:`Woningdaling −${wwdaling}%`,wq:null,ok:!onderWater,prio:onderWater?"kritiek":ltvNaDaling>90?"hoog":"laag"},
      {ico:"🏗️",l:"Dubbele woonlasten",wq:dubbelWq,ok:dubbelWq<55||dubbeleLasten===0,prio:dubbelWq>70?"hoog":"laag"},
      {ico:"🎁",l:"Bonus wegval",wq:bonusWq,ok:bonusWq<42||bonus1===0,prio:bonusWq>50&&bonusZeker==="nee"?"hoog":"laag"},
      {ico:"🏢",l:"Erfpacht herziening",wq:epWqNa,ok:erfpacht==="nee"||epWqNa<42,prio:erfpacht==="ja"&&epWqNa>50?"hoog":"laag"},
      {ico:"🌊",l:"Klimaatrisico",wq:null,ok:klimaatzone==="geen"||klimaatzone==="laag",prio:klimaatzone==="hoog"?"hoog":klimaatzone==="matig"?"middel":"laag"},
    ];

    const risicoCount = scenarios.filter(s=>!s.ok).length;

    return{
      inkBruto1,inkBruto2,inkBrutoT,inkBrutoM,inkNetto1,inkNetto2,inkNettoT,inkNettoM,
      annDeel,rsAnn,rsAflVrij,rsTotaal,rLp,mLAnn,mLAflVrij,mL,ltv,overwaarde,onderhoud,nhgMog,
      canonMnd,gemeenteMnd,opstalMnd,energieExtra,totWoonlast,wqBruto,totWqBruto,totWqNetto,
      bufTot,bufMnd,renteJaar,aftrekVoordeel,nettoML,nettoWq,
      ewfBedrag,ewfMaand,hillenBijtelling,fiscaalVoordeel,nettoMlFiscaal,
      box3Btg,box3Mnd,
      totRAnn,totRLin,
      netCashflow,netCashflowPct,cashflowItems,vasteLasten,kindMnd,
      bonusWq,inkZonderBonus,
      zwInk1,zwTotM,zwWq,zdNaInkM,zdNaWq,
      aoInk1,aoTotM,aoWq,
      rsOrv1,mLOrv1,ovlWq1,ovlWq1MetAnw,rsOrv2,mLOrv2,ovlWq2,anwUitkering,
      minderInkM,minderWq,mantelWq,
      jaarTotStudie,vrijNaStudie,studieKosten,
      jTotP,rsPensioen,mLPensioen,pensMnd,pensWq,
      rsNvp,mLNvp,nvpWq,nvpDelta,
      mLStress,stressWq,stressDelta,
      inkM10,wqOver10,reeleSchuld10,
      wwInk1,wwTotM,wwWq,
      schWq1,schWq2,
      wwNaDaling,ltvNaDaling,onderWater,onderwaterBij,restschuldVerkoop,
      totDubbel,dubbelWq,dubbelMnd,
      canonNieuw,canonDelta,epWqNa,
      obRente,obWq,
      klimaatDaling,ltvNaKlimaat,
      extraSim,extraBesparing,extraKorting,
      ovslBesp,ovslTerugverdien,ovslZinvol,
      aflVsBelegBeter,rendementNaBalsting,aflRenteNaAftrek,extraPm10Belegg,extraPm10Aflos,
      vdBespMnd,vdRoi,vdTerugverdien,
      aflVrijRisico,aflVrijLtv,aflVrijPct,
      scenarios,risicoCount,
    };
  },[hs,ww,rente,lp,rvp,betaald,htype,nhg,aflVrij,aflVrijRente,spaarkapitaal,vve,erfpacht,epCanon,epHerziening,epStijging,gemeenteLasten,opstal,wozWaarde,
     ink1,ink2,l1,l2,dv1,dv2,bonus1,bonusZeker,zzpOmzet,
     orv1,orvB1,orv2,orvB2,aov,aovPct,wlv,wlvMnd,
     spaar,beleg,belegRendement,kinderen,kindKosten,kindLeeftijd,studBijdrage,
     energieLabel,klimaatzone,dubbeleLasten,overbrug,verduurzaming,
     minderPct,pensioenInk,nieuweRente,stressRente,wwMnd,wwPct,wwdaling,
     extraAflospm,overslBoete,overslNieuweR,loongroei,inflatie]);

  const tabs=[
    {id:"gegevens",l:"📋 Gegevens"},
    {id:"dashboard",l:"📊 Dashboard"},
    {id:"scenarios",l:"🔍 Scenario's"},
    {id:"financieel",l:"📈 Rente & Woning"},
    {id:"fiscaal",l:"💶 Fiscaal & Kosten"},
    {id:"strategie",l:"🚀 Strategie"},
    {id:"bescherming",l:"🛡️ Bescherming"},
    {id:"extern",l:"🌍 Externe Bronnen"},
    {id:"actiepunten",l:"🎯 Actiepunten"},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'IBM Plex Sans',sans-serif",color:C.text}}>
      <style>{CSS}</style>

      {/* HEADER */}
      <div style={{background:`linear-gradient(180deg,${C.surface} 0%,${C.bg} 100%)`,borderBottom:`1px solid ${C.border}`,padding:"15px 16px"}}>
        <div style={{maxWidth:1040,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{width:40,height:40,background:`linear-gradient(135deg,${C.gold},#8b6914)`,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,boxShadow:`0 0 18px ${C.goldDim}`}}>🏠</div>
            <div>
              <h1 style={{fontSize:18,fontWeight:700,color:C.text,fontFamily:"'Lora',serif",letterSpacing:-0.3}}>HypotheekCheck <span style={{color:C.gold}}>Pro</span></h1>
              <p style={{fontSize:10,color:C.muted}}>Compleet hypotheek analyse platform · {c.scenarios.length} scenario's</p>
            </div>
          </div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {[
              {l:"Bruto last",v:€(c.mL),col:C.gold},
              {l:"Netto last",v:€(c.nettoMlFiscaal),col:C.green},
              {l:"Woonquote",v:pct(c.wqBruto),col:c.wqBruto<35?C.green:c.wqBruto<42?C.yellow:C.red},
              {l:"Risico's",v:`${c.risicoCount}/${c.scenarios.length}`,col:c.risicoCount===0?C.green:c.risicoCount<=4?C.yellow:C.red},
            ].map(k=>(
              <div key={k.l} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,padding:"5px 12px",textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:700,color:k.col,fontFamily:"'Lora',serif"}}>{k.v}</div>
                <div style={{fontSize:9,color:C.muted}}>{k.l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        <div style={{maxWidth:1040,margin:"0 auto",display:"flex"}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"11px 13px",fontSize:11,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap",color:tab===t.id?C.gold:C.sub,borderBottom:`2px solid ${tab===t.id?C.gold:"transparent"}`,transition:"all .2s"}}>
              {t.l}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:1040,margin:"0 auto",padding:"20px 14px 60px"}}>

        {/* ════ GEGEVENS ═══════════════════════════════════════════════════════ */}
        {tab==="gegevens"&&(
          <div style={{display:"grid",gap:14}}>
            <Sec title="🏦 Hypotheek" delay={0}>
              <G><Field label="Hypotheekbedrag" value={hs} onChange={setHs} pre="€"/>
                <Field label="Woningwaarde" value={ww} onChange={setWw} pre="€"/>
                <Field label="WOZ-waarde" value={wozWaarde} onChange={setWozWaarde} pre="€" hint="Voor EWF-berekening"/>
                <Field label="Rente" value={rente} onChange={setRente} suf="%" step="0.05"/>
                <Field label="Looptijd" value={lp} onChange={setLp} suf="jr"/>
                <Field label="Rentevaste periode" value={rvp} onChange={setRvp} suf="jr"/>
                <Field label="Al afbetaald" value={betaald} onChange={setBetaald} suf="jr"/>
              </G>
              <div style={{display:"flex",gap:18,marginTop:14,flexWrap:"wrap"}}>
                <div><div style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6}}>Type</div>
                  <Toggle value={htype} onChange={setHtype} opts={[{v:"ann",l:"Annuïteit"},{v:"lin",l:"Lineair"}]}/></div>
                <div><div style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6}}>NHG</div>
                  <Toggle value={nhg} onChange={setNhg} opts={[{v:"ja",l:"Ja"},{v:"nee",l:"Nee"}]}/></div>
              </div>
              <div style={{marginTop:14,padding:"12px 14px",background:C.s2,borderRadius:10}}>
                <div style={{fontSize:11,fontWeight:600,color:C.sub,marginBottom:10}}>🔒 Aflossingsvrij deel</div>
                <G cols="repeat(auto-fit,minmax(140px,1fr))">
                  <Field label="Aflossingsvrij bedrag" value={aflVrij} onChange={setAflVrij} pre="€" hint="Max. 50% van woningwaarde"/>
                  <Field label="Rente aflossingsvrij" value={aflVrijRente} onChange={setAflVrijRente} suf="%" step="0.05"/>
                  <Field label="Opgebouwd kapitaal" value={spaarkapitaal} onChange={setSpaarkapitaal} pre="€" hint="Spaarhypotheek o.i.d."/>
                </G>
                {aflVrij>0&&<Alert type="warn">Aflossingsvrij deel ({€(aflVrij)}) wordt nooit afgelost — schuld blijft bestaan. Op einddatum looptijd moet dit herfinanciert of afgelost worden.</Alert>}
              </div>
            </Sec>

            <Sec title="🏠 Woning & Vaste Lasten" delay={30}>
              <G><Field label="VvE bijdrage p/m" value={vve} onChange={setVve} pre="€"/>
                <Field label="Gemeentelijke lasten /jr" value={gemeenteLasten} onChange={setGemeenteLasten} pre="€" hint="OZB + riool + afval"/>
                <Field label="Opstalverzekering /jr" value={opstal} onChange={setOpstall} pre="€"/>
                <Field label="Verduurzaming investering" value={verduurzaming} onChange={setVerduurzaming} pre="€"/>
                <Field label="Dubbele last (doorstroom)" value={dubbeleLasten} onChange={setDubbeleLasten} pre="€" suf="/mnd" hint="0 = n.v.t."/>
                <Field label="Overbruggingskrediet" value={overbrug} onChange={setOverbrug} pre="€" hint="0 = n.v.t."/>
              </G>
              <div style={{display:"flex",gap:18,marginTop:14,flexWrap:"wrap"}}>
                <Sel label="Energielabel" value={energieLabel} onChange={setEnergieLabel} opts={["A++","A+","A","B","C","D","E","F","G"].map(v=>({v,l:`Label ${v}`}))}/>
                <Sel label="Klimaatrisico" value={klimaatzone} onChange={setKlimaatzone} opts={[{v:"geen",l:"Geen"},{v:"laag",l:"Laag"},{v:"matig",l:"Matig"},{v:"hoog",l:"Hoog"}]}/>
              </div>
              <div style={{marginTop:14}}>
                <div style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6}}>Erfpacht</div>
                <Toggle value={erfpacht} onChange={setErfpacht} opts={[{v:"ja",l:"Ja"},{v:"nee",l:"Nee"}]}/>
                {erfpacht==="ja"&&<div style={{marginTop:10}}><G cols="repeat(auto-fit,minmax(140px,1fr))">
                  <Field label="Canon /jr" value={epCanon} onChange={setEpCanon} pre="€"/>
                  <Field label="Herziening over" value={epHerziening} onChange={setEpHerziening} suf="jr"/>
                  <Field label="Verwachte stijging" value={epStijging} onChange={setEpStijging} suf="%"/>
                </G></div>}
              </div>
            </Sec>

            <Sec title="💼 Inkomen" delay={60}>
              <G cols="1fr 1fr">
                <div style={{display:"grid",gap:11}}>
                  <div style={{fontSize:11,fontWeight:600,color:C.gold}}>Persoon 1</div>
                  <div><div style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6}}>Dienstverband</div>
                    <Toggle value={dv1} onChange={setDv1} opts={[{v:"vast",l:"Vast"},{v:"flex",l:"Flex"},{v:"zzp",l:"ZZP"}]}/></div>
                  {dv1==="zzp" ? <Field label="Bruto omzet /jr" value={zzpOmzet} onChange={setZzpOmzet} pre="€" hint="Fiscaal inkomen ~70% omzet"/>
                    : <Field label="Bruto salaris /jr" value={ink1} onChange={setInk1} pre="€"/>}
                  <Field label="Jaarbonus (variabel)" value={bonus1} onChange={setBonus1} pre="€" hint="0 = geen bonus"/>
                  <Field label="Leeftijd" value={l1} onChange={setL1} suf="jr"/>
                  {bonus1>0&&<div><div style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6}}>Bonus gegarandeerd?</div>
                    <Toggle value={bonusZeker} onChange={setBonusZeker} opts={[{v:"ja",l:"Ja"},{v:"nee",l:"Nee"}]}/></div>}
                </div>
                <div style={{display:"grid",gap:11}}>
                  <div style={{fontSize:11,fontWeight:600,color:C.sub}}>Persoon 2 <span style={{color:C.muted}}>(0 = alleen)</span></div>
                  <div><div style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.2,textTransform:"uppercase",marginBottom:6}}>Dienstverband</div>
                    <Toggle value={dv2} onChange={setDv2} opts={[{v:"vast",l:"Vast"},{v:"flex",l:"Flex"},{v:"zzp",l:"ZZP"}]}/></div>
                  <Field label="Bruto salaris /jr" value={ink2} onChange={setInk2} pre="€"/>
                  <Field label="Leeftijd" value={l2} onChange={setL2} suf="jr"/>
                </div>
              </G>
              <div style={{marginTop:12,padding:"10px 13px",background:C.s2,borderRadius:9,fontSize:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Netto inkomen P1</div><div style={{fontWeight:700,color:C.green}}>{€(c.inkNetto1)}/jr</div></div>
                  <div><div style={{fontSize:10,color:C.muted,marginBottom:3}}>Netto inkomen P2</div><div style={{fontWeight:700,color:ink2>0?C.green:C.muted}}>{€(c.inkNetto2)}/jr</div></div>
                </div>
              </div>
            </Sec>

            <Sec title="💰 Buffer, Vermogen & Gezin" delay={90}>
              <G>
                <Field label="Spaargeld" value={spaar} onChange={setSpaar} pre="€"/>
                <Field label="Beleggingen" value={beleg} onChange={setBeleg} pre="€"/>
                <Field label="Verwacht beleggingsrendement" value={belegRendement} onChange={setBelegRendement} suf="%" step="0.5"/>
                <Field label="Aantal kinderen" value={kinderen} onChange={setKinderen}/>
                <Field label="Kosten per kind p/m" value={kindKosten} onChange={setKindKosten} pre="€"/>
                <Field label="Leeftijd jongste kind" value={kindLeeftijd} onChange={setKindLeeftijd} suf="jr"/>
                <Field label="Studie bijdrage p/m" value={studBijdrage} onChange={setStudBijdrage} pre="€"/>
              </G>
            </Sec>

            <Sec title="⚙️ Scenario-instellingen" delay={120}>
              <G>
                <Field label="Minder werken %" value={minderPct} onChange={setMinderPct} suf="%"/>
                <Field label="Pensioeninkomen /jr" value={pensioenInk} onChange={setPensioenInk} pre="€"/>
                <Field label="Verwachte nieuwe rente" value={nieuweRente} onChange={setNieuweRente} suf="%" step="0.05"/>
                <Field label="Stress test rente" value={stressRente} onChange={setStressRente} suf="%" step="0.1"/>
                <Field label="WW uitkering %" value={wwPct} onChange={setWwPct} suf="%"/>
                <Field label="Woningwaardedaling %" value={wwdaling} onChange={setWwdaling} suf="%"/>
                <Field label="Loongroei /jr" value={loongroei} onChange={setLoongroei} suf="%" step="0.1"/>
                <Field label="Inflatie /jr" value={inflatie} onChange={setInflatie} suf="%" step="0.1"/>
                <Field label="Extra aflossen p/m" value={extraAflospm} onChange={setExtraAflospm} pre="€"/>
                <Field label="Oversluiten boete" value={overslBoete} onChange={setOverslBoete} pre="€"/>
                <Field label="Oversluiten nieuwe rente" value={overslNieuweR} onChange={setOverslNieuweR} suf="%" step="0.05"/>
              </G>
            </Sec>

            <button onClick={()=>setTab("actiepunten")} style={{background:`linear-gradient(135deg,${C.gold},#8b6914)`,color:"#07090f",border:"none",borderRadius:11,padding:"12px 26px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",alignSelf:"flex-start",boxShadow:`0 4px 22px ${C.goldDim}`}}>
              Volledig analyseren → {c.risicoCount} risico's gevonden
            </button>
          </div>
        )}

        {/* ════ DASHBOARD ════════════════════════════════════════════════════════ */}
        {tab==="dashboard"&&(
          <div style={{display:"grid",gap:14}}>
            <G cols="repeat(auto-fit,minmax(115px,1fr))">
              <KPI label="Bruto last" value={€(c.mL)} color={C.gold}/>
              <KPI label="Netto last" value={€(c.nettoMlFiscaal)} sub="na aftrek/EWF" color={C.green}/>
              <KPI label="Totale woonlast" value={€(c.totWoonlast)} sub="incl. alle lasten" color={C.yellow}/>
              <KPI label="Restschuld" value={€(c.rsTotaal)} color={C.blue}/>
              <KPI label="Overwaarde" value={€(c.overwaarde)} color={c.overwaarde>0?C.green:C.red}/>
              <KPI label="LTV" value={pct(c.ltv)} color={c.ltv<80?C.green:C.yellow}/>
              <KPI label="Buffer" value={`${c.bufMnd.toFixed(1)}×`} color={c.bufMnd>=6?C.green:c.bufMnd>=3?C.yellow:C.red}/>
              <KPI label="Risico's" value={`${c.risicoCount}/${c.scenarios.length}`} color={c.risicoCount===0?C.green:c.risicoCount<=4?C.yellow:C.red}/>
            </G>

            <G cols="1fr 1fr">
              <Sec title="Woonquotes">
                {[["Bruto (hypotheek/bruto ink)",c.wqBruto,[35,45]],["Totaal (alle lasten/bruto)",c.totWqBruto,[40,52]],["Totaal (alle lasten/netto)",c.totWqNetto,[45,60]],["Netto (na renteaftrek/EWF)",c.nettoWq,[30,40]]].map(([l,v,t])=>(
                  <div key={l} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                      <span style={{color:C.sub}}>{l}</span>
                      <span style={{fontWeight:700,color:v>t[1]?C.red:v>t[0]?C.yellow:C.green}}>{pct(v)}</span>
                    </div>
                    <Bar value={v} max={80} t={t}/>
                  </div>
                ))}
              </Sec>
              <Sec title="Netto cashflow p/m">
                {c.cashflowItems.map((item,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                    <span style={{color:item.type==="totaal"?C.text:C.sub}}>{item.l}</span>
                    <span style={{fontWeight:item.type==="totaal"?700:400,color:item.type==="totaal"?(item.v>=0?C.green:C.red):item.v>=0?C.green:C.red}}>{item.v>=0?"+":""}{€(item.v)}</span>
                  </div>
                ))}
              </Sec>
            </G>

            <Sec title="Alle scenario's">
              <div style={{display:"grid",gap:6}}>
                {c.scenarios.map((s,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 11px",background:C.s2,borderRadius:8,gap:8,flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <span style={{fontSize:14}}>{s.ico}</span>
                      <span style={{fontSize:11,color:C.text}}>{s.l}</span>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      {s.wq!==null&&<span style={{fontSize:11,color:C.muted}}>wq: <b style={{color:s.ok?C.green:C.red}}>{pct(s.wq)}</b></span>}
                      <Prio level={s.ok?"laag":s.prio}/><Badge ok={s.ok}/>
                    </div>
                  </div>
                ))}
              </div>
            </Sec>
          </div>
        )}

        {/* ════ SCENARIO'S ════════════════════════════════════════════════════════ */}
        {tab==="scenarios"&&(
          <div style={{display:"grid",gap:14}}>
            <ScCard icon="🩺" title="Arbeidsongeschiktheid (WIA/AOV)" accent={C.purple} delay={0}>
              <Row label="Inkomen P1 bij AO" value={€(c.aoInk1/12)} sub={aov==="ja"?`AOV ${aovPct}%`:"WIA 70%"}/>
              <Row label="Inkomen P2" value={€(c.inkBruto2/12)}/><Row label="Totaal" value={€(c.aoTotM)} bold/>
              <WQ value={c.aoWq}/>
              {(dv1==="zzp"||dv1==="flex")&&<Alert type="bad">ZZP/flex: géén WIA. AOV is essentieel.</Alert>}
              {c.aoWq>42&&aov==="nee"&&<Alert type="bad">Zonder AOV onvoldoende inkomen. Min. AOV 70% dekking aanbevolen.</Alert>}
            </ScCard>

            <ScCard icon="💔" title="Overlijden partner 1 + ANW" accent={C.red} delay={20}>
              <Row label="ORV uitkering P1" value={orv1==="ja"?€(orvB1):"Geen"} accent={orv1==="ja"?C.green:C.red}/>
              <Row label="ANW-uitkering (indicatief)" value={€(c.anwUitkering)} sub="per maand (indien van toepassing)"/>
              <Row label="Inkomen P2 + ANW" value={€(c.inkBruto2/12+c.anwUitkering)} bold/>
              <Row label="Maandlast" value={€(c.mLOrv1)}/>
              <WQ value={c.ovlWq1MetAnw} label="Woonquote incl. ANW"/>
              {c.ovlWq1>42&&!orv1&&<Alert type="bad">ORV ontbreekt. Zonder ORV en ANW is de hypotheek niet betaalbaar voor P2.</Alert>}
            </ScCard>

            <ScCard icon="💙" title="Overlijden partner 2" accent={C.blue} delay={30}>
              <Row label="ORV P2" value={orv2==="ja"?€(orvB2):"Geen"} accent={orv2==="ja"?C.green:C.red}/>
              <Row label="Nieuwe last" value={€(c.mLOrv2)} bold/><Row label="P1 solo inkomen" value={€(c.inkBruto1/12)}/>
              <WQ value={c.ovlWq2}/>
            </ScCard>

            <ScCard icon="🤒" title="Ziektewet (max. 2 jaar, 70%)" accent={C.yellow} delay={40}>
              <Row label="ZW-inkomen P1 (70%)" value={€(c.zwInk1)}/><Row label="Inkomen P2" value={€(c.inkBruto2/12)}/>
              <WQ value={c.zwWq} t={[42,55]}/>
              <Alert type="info">Na 2 jaar ZW volgt WIA met mogelijk lager inkomen. Tussenperiode is kritiek — zorg voor noodbuffer van min. {€(c.mL*24)}.</Alert>
            </ScCard>

            <ScCard icon="🤰" title="Zwangerschaps- & bevallingsverlof" accent={C.purple} delay={50}>
              <Row label="Tijdens verlof (UWV 100%)" value={€(c.inkBruto1/12)} sub="P1 volledig gedekt"/>
              <Row label="Na terugkeer (schatting 80%)" value={€(c.zdNaInkM)} bold/>
              <WQ value={c.zdNaWq} label="Woonquote na terugkeer"/>
              {dv1==="zzp"&&<Alert type="bad">ZZP: geen UWV-zwangerschapsuitkering. AOV met zwangerschapsmodule of eigen buffer vereist.</Alert>}
            </ScCard>

            <ScCard icon="⏰" title={`Minder werken (−${minderPct}%)`} accent={C.yellow} delay={60}>
              <Row label="Huidig" value={€(c.inkBrutoM)}/><Row label={`Na −${minderPct}%`} value={€(c.minderInkM)} bold accent={C.yellow}/>
              <WQ value={c.minderWq}/>
              <Alert type="info">Max. daling: <b>{pct(Math.max(0,(1-(c.mL/c.inkBrutoM)/0.42)*100))}</b> voor 42% norm.</Alert>
            </ScCard>

            <ScCard icon="❤️" title="Mantelzorg — partner 2 stopt volledig" accent={C.red} delay={70}>
              <Row label="P1 solo inkomen" value={€(c.inkBruto1/12)} bold/><Row label="Maandlast" value={€(c.mL)}/>
              <WQ value={c.mantelWq}/>
              {c.mantelWq>42&&<Alert type="bad">Grote tweeverdieners-afhankelijkheid. Bij mantelzorg is hypotheek solo niet betaalbaar. Buffer: {€(c.mL*12)}.</Alert>}
            </ScCard>

            <ScCard icon="👶" title="Kinderkosten & studiekosten" accent={C.teal} delay={80}>
              <Row label="Netto inkomen" value={€(c.inkNettoM)}/><Row label="Hypotheeklast" value={`−${€(c.mL)}`}/>
              <Row label="Vaste woonlasten" value={`−${€(c.totWoonlast-c.mL)}`}/><Row label={`Kinderen (${kinderen}×)`} value={`−${€(c.kindMnd)}`} accent={C.red}/>
              <Row label="Vrij besteedbaar" value={€(c.netCashflow)} accent={c.netCashflow>=300?C.green:C.red} bold/>
              {kinderen>0&&c.jaarTotStudie>0&&<Row label={`Studiekosten over ~${c.jaarTotStudie}jr`} value={€(c.studieKosten)} sub="per maand"/>}
              {c.netCashflow<0&&<Alert type="bad">Negatieve cashflow. Tekort {€(Math.abs(c.netCashflow))}/mnd.</Alert>}
            </ScCard>

            <ScCard icon="🏖️" title={`Pensioen (AOW-leeftijd 67)`} accent={C.green} delay={90}>
              <Row label="Restschuld bij pensioen" value={c.rsPensioen===0?"Afgelost ✓":€(c.rsPensioen)} accent={c.rsPensioen===0?C.green:C.red} bold/>
              <Row label="Maandlast op pensioen" value={c.mLPensioen>0?€(c.mLPensioen):"Geen"}/>
              <Row label="Pensioeninkomen" value={€(c.pensMnd)} sub="per maand"/>
              {aflVrij>0&&<Row label="Aflossingsvrij nog open" value={€(aflVrij)} accent={C.red} sub="moet herfinanciert worden"/>}
              <WQ value={c.pensWq} label="Woonquote op pensioen" t={[30,40]}/>
              {c.rsPensioen===0?<Alert type="ok">Volledig afgelost vóór pensioen.</Alert>:c.pensWq>38?<Alert type="bad">Hoge last op pensioen. Overweeg extra aflossen of verkoop bij pensionering.</Alert>:<Alert type="ok">Pensioeninkomen is voldoende.</Alert>}
            </ScCard>

            <ScCard icon="💼" title="Werkloosheid (WW)" accent={C.yellow} delay={100}>
              <Row label="WW-inkomen P1" value={€(c.wwInk1)}/><Row label="Inkomen P2" value={€(c.inkBruto2/12)}/>
              <Row label="Buffer" value={`${c.bufMnd.toFixed(1)} mnd`} accent={c.bufMnd>=3?C.green:C.red}/>
              <WQ value={c.wwWq} t={[42,55]}/>
              {(dv1==="zzp"||dv1==="flex")&&<Alert type="bad">ZZP/flex: geen WW. Min. 6 maanden reserve vereist.</Alert>}
            </ScCard>

            <ScCard icon="⚖️" title="Scheiding" accent={C.purple} delay={110}>
              <G cols="1fr 1fr">
                {[{l:"P1 solo",wq:c.schWq1,ink:c.inkBruto1/12},{l:"P2 solo",wq:c.schWq2,ink:c.inkBruto2/12}].map(p=>(
                  <div key={p.l} style={{background:C.s2,borderRadius:10,padding:13}}>
                    <div style={{fontSize:11,fontWeight:600,color:C.sub,marginBottom:8}}>{p.l}</div>
                    <div style={{fontSize:16,fontWeight:700,color:p.wq<42?C.green:C.red,fontFamily:"'Lora',serif"}}>{pct(p.wq)}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>woonquote</div>
                    <div style={{marginTop:7}}><Badge ok={p.wq<42||p.ink===0}/></div>
                  </div>
                ))}
              </G>
              <Row label="Overwaarde bij verkoop" value={€(c.overwaarde)} accent={c.overwaarde>0?C.green:C.red}/>
            </ScCard>
          </div>
        )}

        {/* ════ RENTE & WONING ════════════════════════════════════════════════════ */}
        {tab==="financieel"&&(
          <div style={{display:"grid",gap:14}}>
            <ScCard icon="📈" title={`Nieuwe rentevaste periode → ${nieuweRente}%`} accent={C.blue} delay={0}>
              <Row label="Restschuld bij herziening" value={€(c.rsNvp)}/><Row label="Huidige last" value={€(c.mL)}/>
              <Row label="Nieuwe last" value={€(c.mLNvp)} accent={c.nvpDelta>0?C.red:C.green} bold/>
              <Row label="Verschil p/m" value={`${c.nvpDelta>0?"+":""}${€(c.nvpDelta)}`} accent={c.nvpDelta>0?C.red:C.green}/>
              <WQ value={c.nvpWq}/>
              {c.nvpDelta>300&&<Alert type="warn">Bouw {€(c.nvpDelta*24)} buffer op (2 jaar stijging).</Alert>}
            </ScCard>

            <ScCard icon="🔥" title={`Rente stress test → ${stressRente}%`} accent={C.red} delay={20}>
              <G cols="repeat(auto-fit,minmax(120px,1fr))">
                <KPI label="Huidige last" value={€(c.mL)} color={C.gold} small/><KPI label={`Last bij ${stressRente}%`} value={€(c.mLStress)} color={C.red} small/>
                <KPI label="Extra p/m" value={`+${€(c.stressDelta)}`} color={C.red} small/><KPI label="Extra p/jaar" value={€(c.stressDelta*12)} color={C.red} small/>
              </G>
              <WQ value={c.stressWq} label={`Woonquote bij ${stressRente}%`} t={[45,60]}/>
              {c.stressWq>50?<Alert type="bad">Hypotheek nauwelijks betaalbaar bij extreme rente. Extra aflossen verlaagt dit risico.</Alert>:<Alert type="ok">Betaalbaar bij stress test {stressRente}%.</Alert>}
            </ScCard>

            <ScCard icon="📊" title="Inflatie & reële last" accent={C.teal} delay={40}>
              <G cols="repeat(auto-fit,minmax(120px,1fr))">
                <KPI label="Woonquote nu" value={pct(c.wqBruto)} color={C.gold} small/>
                <KPI label="Woonquote +10jr" value={pct(c.wqOver10)} color={C.green} small/>
                <KPI label="Reële schuld +10jr" value={€(c.reeleSchuld10)} sub="in huidig geld" color={C.teal} small/>
                <KPI label="Inkomen +10jr" value={€(c.inkM10)} sub={`+${loongroei}%/jr`} color={C.blue} small/>
              </G>
              <Alert type="ok">Door {loongroei}%/jr loongroei daalt woonquote naar {pct(c.wqOver10)} over 10 jaar. De reële schuld daalt van {€(c.rsTotaal)} naar {€(c.reeleSchuld10)}.</Alert>
            </ScCard>

            <ScCard icon="📉" title={`Woningwaardedaling −${wwdaling}%`} accent={C.red} delay={60}>
              <G cols="repeat(auto-fit,minmax(120px,1fr))">
                <KPI label="Waarde na daling" value={€(c.wwNaDaling)} color={C.red} small/>
                <KPI label="LTV na daling" value={pct(c.ltvNaDaling)} color={c.ltvNaDaling>100?C.red:c.ltvNaDaling>90?C.yellow:C.green} small/>
                <KPI label="Onder water bij" value={`−${pct(c.onderwaterBij)}`} color={C.yellow} small/>
                <KPI label={c.onderWater?"Tekort":"Overwaarde"} value={€(Math.abs(c.wwNaDaling-c.rsTotaal))} color={c.onderWater?C.red:C.green} small/>
              </G>
              {c.onderWater&&<><Row label="Restschuld bij gedwongen verkoop" value={€(c.restschuldVerkoop)} accent={C.red} bold/>
                <Alert type="bad">Onder water! Schuld ({€(c.rsTotaal)}) &gt; waarde ({€(c.wwNaDaling)}). NHG-bescherming: {c.nhgMog?"Ja":"Nee"}.</Alert></>}
            </ScCard>

            <ScCard icon="🔨" title="Gedwongen verkoop — scenario's" accent={C.orange} delay={80}>
              {["0","5","10","15","20","25"].map(d=>{
                const v=ww*(1-Number(d)/100)*0.93,rs=Math.max(0,c.rsTotaal-v);
                return <div key={d} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                  <span style={{color:C.sub}}>−{d}% waardedaling</span>
                  <span style={{color:rs>0?C.red:C.green,fontWeight:600}}>{rs>0?`Restschuld ${€(rs)}`:`Opbrengst +${€(v-c.rsTotaal)}`}</span>
                </div>;
              })}
            </ScCard>

            <ScCard icon="🏗️" title="Dubbele woonlasten & Overbrugging" accent={C.orange} delay={100}>
              <Row label="Huidige hypotheeklast" value={€(c.mL)}/><Row label="Nieuwe woonlast" value={€(dubbeleLasten)}/>
              <Row label="Totaal dubbele lasten" value={€(c.totDubbel)} accent={C.orange} bold/>
              <Row label="Buffer houdt" value={`${c.dubbelMnd} maanden`} accent={Number(c.dubbelMnd)>=3?C.green:C.red}/>
              {overbrug>0&&<><Row label="Overbruggingsrente p/m" value={€(c.obRente)} sub={`${rente}% over ${€(overbrug)}`}/>
                <WQ value={c.obWq} label="Woonquote incl. OBK"/></>}
            </ScCard>

            <ScCard icon="🏢" title="Aflossingsvrij deel" accent={C.red} delay={120}>
              <G cols="repeat(auto-fit,minmax(120px,1fr))">
                <KPI label="Aflossingsvrij" value={€(aflVrij)} color={aflVrij>0?C.red:C.green} small/>
                <KPI label="% van hypotheek" value={pct(c.aflVrijPct)} color={c.aflVrijPct>50?C.red:c.aflVrijPct>0?C.yellow:C.green} small/>
                <KPI label="LTV aflossingsvrij" value={pct(c.aflVrijLtv)} color={C.yellow} small/>
                <KPI label="Rente p/m" value={€(c.mLAflVrij)} sub="geen aflossing" color={C.red} small/>
              </G>
              {aflVrij>0?<>
                <Alert type="bad">Aflossingsvrij deel ({€(aflVrij)}) wordt NOOIT afgelost. Op einddatum looptijd moet u dit herfinancieren of aflossen. Houd er rekening mee dat dit bij pensioen moeilijker is.</Alert>
                {c.aflVrijPct>50&&<Alert type="bad">Meer dan 50% aflossingsvrij — boven de fiscale norm voor renteaftrek.</Alert>}
              </>:<Alert type="ok">Geen aflossingsvrij deel — volledige hypotheek wordt afgelost.</Alert>}
            </ScCard>

            <ScCard icon="🌱" title="Energielabel & Klimaatrisico" accent={C.green} delay={140}>
              <G cols="1fr 1fr">
                <div style={{background:C.s2,borderRadius:10,padding:14,textAlign:"center"}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:5}}>Energielabel</div>
                  <div style={{fontSize:32,fontWeight:700,fontFamily:"'Lora',serif",color:["A++","A+","A","B"].includes(energieLabel)?C.green:energieLabel==="C"?C.yellow:C.red}}>{energieLabel}</div>
                  <div style={{fontSize:11,color:C.sub,marginTop:4}}>{c.energieExtra===0?"Gemiddeld":c.energieExtra>0?`+${€(c.energieExtra)}/mnd extra`:€(Math.abs(c.energieExtra))+"/mnd besparing"}</div>
                </div>
                <div style={{background:C.s2,borderRadius:10,padding:14,textAlign:"center"}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:5}}>Klimaatrisico</div>
                  <div style={{fontSize:20,fontWeight:700,fontFamily:"'Lora',serif",color:klimaatzone==="geen"?C.green:klimaatzone==="hoog"?C.red:C.yellow}}>{klimaatzone}</div>
                  <div style={{fontSize:11,color:C.sub,marginTop:4}}>Waardedaling: {€(c.klimaatDaling)}</div>
                </div>
              </G>
              <Row label="LTV na klimaatcorrectie" value={pct(c.ltvNaKlimaat)} accent={c.ltvNaKlimaat<80?C.green:C.yellow}/>
              {klimaatzone==="hoog"&&<Alert type="bad">Hoog klimaatrisico kan woningwaarde structureel beïnvloeden. Check verzekerbaarheid.</Alert>}
            </ScCard>
          </div>
        )}

        {/* ════ FISCAAL & KOSTEN ═══════════════════════════════════════════════════ */}
        {tab==="fiscaal"&&(
          <div style={{display:"grid",gap:14}}>
            <ScCard icon="💶" title="Hypotheekrenteaftrek (HRA)" accent={C.green} delay={0}>
              <G cols="repeat(auto-fit,minmax(120px,1fr))">
                <KPI label="Bruto maandlast" value={€(c.mL)} color={C.gold} small/>
                <KPI label="Renteaftrek /mnd" value={€(c.aftrekVoordeel)} color={C.green} small/>
                <KPI label="Netto last (HRA)" value={€(c.nettoML)} color={C.green} small/>
                <KPI label="Besparing /jaar" value={€(c.aftrekVoordeel*12)} color={C.green} small/>
              </G>

            setExtLoading(true); setExtStatus("Zoeken..."); setExtAiData(null);
            try {
              const res = await fetch("https://api.anthropic.com/v1/messages",{
                method:"POST", headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                  model:"claude-sonnet-4-20250514", max_tokens:800,
                  tools:[{type:"web_search_20250305",name:"web_search"}],
                  messages:[{role:"user",content:`Zoek voor adres ${extPostcode} ${extHuisnr} Nederland: klimaatcijfer scores (wateroverlast/overstroming/droogte/hitte 1-10), funderingslabel (A-E), woningcijfer (1-10), actuele hypotheekrente 10jr vast. Geef ALLEEN JSON: {"klimaat":{"wateroverlast":N,"overstroming":N,"droogte":N,"hitte":N},"fundering":{"label":"X","type":"hout/beton/onbekend"},"woning":{"score":N,"leefbaarheid":N,"voorzieningen":N},"hypotheek":{"marktrente":N}}`}]
                })
              });
              const d = await res.json();
              const txt = (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(" ");
              const m = txt.match(/\{[\s\S]*\}/);
              if(m){ const p=JSON.parse(m[0]);
                if(p.klimaat){setKlimWater(p.klimaat.wateroverlast||3);setKlimOverstr(p.klimaat.overstroming||2);setKlimDroogte(p.klimaat.droogte||4);setKlimHitte(p.klimaat.hitte||4);}
                if(p.fundering){setFundLabel(p.fundering.label||"C");setFundType(p.fundering.type||"beton");}
                if(p.woning){setWonScore(p.woning.score||7);setWonLeef(p.woning.leefbaarheid||7);setWonVoorz(p.woning.voorzieningen||6);}
                if(p.hypotheek){setMarktRente(p.hypotheek.marktrente||3.9);}
                setExtStatus("✅ Scores ingevuld — controleer en pas aan indien nodig");
                setExtAiData(p);
              } else { setExtStatus("⚠️ Geen exacte data gevonden — vul handmatig in via de sites hieronder"); }
            } catch(e){ setExtStatus("❌ Fout bij ophalen — vul handmatig in"); } finally { setExtLoading(false); }
          }
