            {/* Adres & lookup */}
            <Sec title="📍 Adres opzoeken" delay={0}>
              <p style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.7}}>Vul uw adres in en klik "AI Opzoeken" — de AI zoekt scores op via klimaatcijfer.nl, funderingscijfer.nl, woningcijfer.nl en hypotheekcijfer.nl. Daarna kunt u de scores handmatig aanpassen.</p>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                {[["Postcode",extPostcode,setExtPostcode,100,"1234AB"],["Huisnr.",extHuisnr,setExtHuisnr,80,"1"]].map(([lbl,val,set,w,ph])=>(
                  <div key={lbl} style={{display:"flex",flexDirection:"column",gap:4}}>
                    <label style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.1,textTransform:"uppercase"}}>{lbl}</label>
                    <input value={val} onChange={e=>set(e.target.value.toUpperCase())} placeholder={ph}
                      style={{width:w,background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,padding:"9px 10px",fontSize:14,fontFamily:"inherit",outline:"none"}}/>
                  </div>
                ))}
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <label style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.1,textTransform:"uppercase"}}>&nbsp;</label>
                  <button onClick={opzoeken} disabled={extLoading} style={{background:extLoading?C.s3:`linear-gradient(135deg,${C.gold},#8b6914)`,color:extLoading?C.muted:"#07090f",border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:extLoading?"wait":"pointer",fontFamily:"inherit"}}>
                    {extLoading?"⏳ Zoeken...":"🔍 AI Opzoeken"}
                  </button>
                </div>
              </div>
              {extStatus&&<div style={{fontSize:12,padding:"8px 12px",borderRadius:8,background:C.s2,color:extStatus.startsWith("✅")?C.green:extStatus.startsWith("❌")?C.red:C.yellow,marginBottom:12}}>{extStatus}</div>}
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:C.muted,alignSelf:"center"}}>Direct openen:</span>
                {[["🌊 klimaatcijfer.nl","https://www.klimaatcijfer.nl",C.blue],["🏗️ funderingscijfer.nl","https://www.funderingscijfer.nl",C.orange],["🏠 woningcijfer.nl","https://www.woningcijfer.nl",C.teal],["📊 hypotheekcijfer.nl","https://www.hypotheekcijfer.nl",C.gold]].map(([l,u,col])=>(
                  <a key={l} href={u} target="_blank" rel="noopener noreferrer" style={{background:`${col}18`,color:col,border:`1px solid ${col}35`,borderRadius:7,padding:"5px 11px",fontSize:11,fontWeight:600,textDecoration:"none"}}>
                    {l} ↗
                  </a>
                ))}
              </div>
            </Sec>

            {/* Samenvatting */}
            {[!klimOk,!fundOk,!wonOk,!renteOk].some(Boolean)&&(
              <div style={{background:C.redDim,border:`1px solid ${C.red}30`,borderRadius:11,padding:"13px 16px",display:"flex",gap:12,alignItems:"center"}}>
                <span style={{fontSize:22}}>⚠️</span>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:3}}>{[!klimOk&&"Klimaat",!fundOk&&"Fundering",!wonOk&&"Woningcijfer",!renteOk&&"Rente"].filter(Boolean).length} externe risico's</div>
                  <div style={{fontSize:12,color:C.red}}>{[!klimOk&&"Klimaatrisico",!fundOk&&"Funderingsrisico",!wonOk&&"Woningkwaliteit",!renteOk&&"Renteachterstand"].filter(Boolean).join(" · ")}</div>
                </div>
              </div>
            )}

            {/* Klimaatcijfer */}
            <div className="card" style={{background:C.surface,borderRadius:13,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{background:`${C.blue}12`,borderBottom:`1px solid ${C.border}`,padding:"13px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:19}}>🌊</span><div><div style={{fontSize:14,fontWeight:600,color:C.text,fontFamily:"'Lora',serif"}}>Klimaatcijfer.nl</div><div style={{fontSize:10,color:C.muted}}>klimaatcijfer.nl</div></div></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:17,fontWeight:700,fontFamily:"'Lora',serif",color:klimGem>6?C.red:klimGem>4?C.yellow:C.green}}>{klimGem.toFixed(1)}/10</span><Badge ok={klimOk}/><a href="https://www.klimaatcijfer.nl" target="_blank" rel="noopener noreferrer" style={{background:`${C.blue}22`,color:C.blue,border:`1px solid ${C.blue}40`,borderRadius:7,padding:"4px 11px",fontSize:11,fontWeight:600,textDecoration:"none"}}>↗ Open</a></div>
              </div>
              <div style={{padding:18}}>
                <SliderRow label="💧 Wateroverlast" value={klimWater} onChange={setKlimWater}/>
                <SliderRow label="🌊 Overstroming" value={klimOverstr} onChange={setKlimOverstr}/>
                <SliderRow label="🌵 Droogte" value={klimDroogte} onChange={setKlimDroogte}/>
                <SliderRow label="🔥 Hitte" value={klimHitte} onChange={setKlimHitte}/>
                <G cols="1fr 1fr" gap={10}>
                  {[{l:"Gem. klimaatcijfer",v:`${klimGem.toFixed(1)}/10`,c:klimGem>6?C.red:klimGem>4?C.yellow:C.green},{l:"Verzekering",v:klimGem>7?"Mogelijk onverzekerbaar":klimGem>5?"+€200–500/jr":"Normaal",c:klimGem>7?C.red:klimGem>5?C.yellow:C.green},{l:"Waarde-effect",v:klimOverstr>7?"−5 tot −15%":klimWater>7?"−2 tot −8%":"Beperkt",c:klimOverstr>7?C.red:C.yellow},{l:"Aanpassing",v:klimGem>6?"€5k–€30k":"Beperkt",c:klimGem>6?C.yellow:C.green}].map(k=>(
                    <div key={k.l} style={{background:C.s2,borderRadius:8,padding:10}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>{k.l}</div><div style={{fontSize:13,fontWeight:700,color:k.c,fontFamily:"'Lora',serif"}}>{k.v}</div></div>
                  ))}
                </G>
                {klimOverstr>7&&<Alert type="bad">Zeer hoog overstromingsrisico. Controleer verzekerbaarheid en WOZ-waarde ontwikkeling.</Alert>}
                {klimOk&&<Alert type="ok">Klimaatscores zijn acceptabel voor dit adres.</Alert>}
              </div>
            </div>

            {/* Funderingscijfer */}
            <div className="card" style={{background:C.surface,borderRadius:13,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{background:`${C.orange}12`,borderBottom:`1px solid ${C.border}`,padding:"13px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:19}}>🏗️</span><div><div style={{fontSize:14,fontWeight:600,color:C.text,fontFamily:"'Lora',serif"}}>Funderingscijfer.nl</div><div style={{fontSize:10,color:C.muted}}>funderingscijfer.nl — FunderMaps A–E systematiek</div></div></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:17,fontWeight:700,fontFamily:"'Lora',serif",color:{A:C.green,B:C.teal,C:C.yellow,D:C.orange,E:C.red}[fundLabel]||C.sub}}>Label {fundLabel}</span><Badge ok={fundOk}/><a href="https://www.funderingscijfer.nl" target="_blank" rel="noopener noreferrer" style={{background:`${C.orange}22`,color:C.orange,border:`1px solid ${C.orange}40`,borderRadius:7,padding:"4px 11px",fontSize:11,fontWeight:600,textDecoration:"none"}}>↗ Open</a></div>
              </div>
              <div style={{padding:18}}>
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:600,color:C.muted,letterSpacing:1.1,textTransform:"uppercase",marginBottom:7}}>Funderingslabel</div>
                  <div style={{display:"flex",gap:6}}>
                    {[["A",C.green,"Uitstekend"],["B",C.teal,"Goed"],["C",C.yellow,"Matig"],["D",C.orange,"Slecht"],["E",C.red,"Kritiek"]].map(([v,col,hint])=>(
                      <button key={v} onClick={()=>setFundLabel(v)} style={{padding:"7px 14px",borderRadius:7,border:`1px solid ${fundLabel===v?col:C.border}`,background:fundLabel===v?`${col}22`:"transparent",color:fundLabel===v?col:C.sub,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",flex:1,transition:"all .2s"}} title={hint}>{v}</button>
                    ))}
                  </div>
                  {[["A","Uitstekend — geen risico"],["B","Goed — beperkt risico"],["C","Matig — periodiek monitoren"],["D","Slecht — onderzoek nodig (QuickScan €350–650)"],["E","Kritiek — direct herstel vereist (€80k–€150k)"]].find(([v])=>v===fundLabel)&&(
                    <div style={{fontSize:11,color:C.sub,marginTop:6}}>ℹ️ {[["A","Uitstekend — geen risico"],["B","Goed — beperkt risico"],["C","Matig — periodiek monitoren"],["D","Slecht — onderzoek nodig (QuickScan €350–650)"],["E","Kritiek — direct herstel vereist (€80k–€150k)"]].find(([v])=>v===fundLabel)[1]}</div>
                  )}
                </div>
                <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
                  {[["beton","Beton",C.green],["hout","Hout (paalrot!)",C.yellow],["staal","Staal",C.teal],["ondiep","Ondiep",C.orange],["onbekend","Onbekend",C.sub]].map(([v,l,col])=>(
                    <button key={v} onClick={()=>setFundType(v)} style={{padding:"5px 11px",borderRadius:7,border:`1px solid ${fundType===v?col:C.border}`,background:fundType===v?`${col}22`:"transparent",color:fundType===v?col:C.sub,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>{l}</button>
                  ))}
                </div>
                <div style={{marginBottom:14}}>
                  <Field label="Bouwjaar woning" value={fundBouwjaar} onChange={setFundBouwjaar}/>
                </div>
                <G cols="1fr 1fr" gap={10}>
                  {[{l:"Herstelkosten",v:fundHerstel>0?`€${fundHerstel.toLocaleString("nl-NL")}`:"Geen",c:fundHerstel>50000?C.red:fundHerstel>0?C.yellow:C.green},{l:"Waarde-effect",v:{A:"Neutraal",B:"Neutraal",C:"−0 tot −5%",D:"−5 tot −15%",E:"−10 tot −25%"}[fundLabel],c:{A:C.green,B:C.green,C:C.yellow,D:C.red,E:C.red}[fundLabel]},{l:"Paalrot risico",v:fundType==="hout"&&fundBouwjaar<1970?"Hoog":fundType==="hout"?"Matig":"Laag",c:fundType==="hout"&&fundBouwjaar<1970?C.red:fundType==="hout"?C.yellow:C.green},{l:"Financiering",v:{A:"Normaal",B:"Normaal",C:"Normaal",D:"Moeizamer",E:"Mogelijk geen hyp."}[fundLabel],c:{A:C.green,B:C.green,C:C.green,D:C.yellow,E:C.red}[fundLabel]}].map(k=>(
                    <div key={k.l} style={{background:C.s2,borderRadius:8,padding:10}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>{k.l}</div><div style={{fontSize:13,fontWeight:700,color:k.c,fontFamily:"'Lora',serif"}}>{k.v}</div></div>
                  ))}
                </G>
                {fundLabel==="E"&&<Alert type="bad">Kritieke fundering! Herstel urgent — €80k–€150k. Hypotheekverstrekker kan aanvullende eisen stellen. Direct een funderingsonderzoek (QuickScan ~€350–650).</Alert>}
                {fundLabel==="D"&&<Alert type="bad">Slechte fundering (D). Funderingsonderzoek sterk aanbevolen. Kosten: €40k–€80k.</Alert>}
                {fundType==="hout"&&fundBouwjaar<1970&&<Alert type="warn">Houten palen + bouwjaar vóór 1970: verhoogd paalrot-risico. Meest voorkomende funderingsprobleem NL (487k+ woningen).</Alert>}
                {fundOk&&!( fundType==="hout"&&fundBouwjaar<1970)&&<Alert type="ok">Funderingslabel {fundLabel} — geen direct risico.</Alert>}
              </div>
            </div>

            {/* Woningcijfer */}
            <div className="card" style={{background:C.surface,borderRadius:13,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{background:`${C.teal}12`,borderBottom:`1px solid ${C.border}`,padding:"13px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:19}}>🏠</span><div><div style={{fontSize:14,fontWeight:600,color:C.text,fontFamily:"'Lora',serif"}}>Woningcijfer.nl</div><div style={{fontSize:10,color:C.muted}}>woningcijfer.nl</div></div></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:17,fontWeight:700,fontFamily:"'Lora',serif",color:wonGem>=7?C.green:wonGem>=5?C.yellow:C.red}}>{wonGem.toFixed(1)}/10</span><Badge ok={wonOk}/><a href="https://www.woningcijfer.nl" target="_blank" rel="noopener noreferrer" style={{background:`${C.teal}22`,color:C.teal,border:`1px solid ${C.teal}40`,borderRadius:7,padding:"4px 11px",fontSize:11,fontWeight:600,textDecoration:"none"}}>↗ Open</a></div>
              </div>
              <div style={{padding:18}}>
                <SliderRow label="🏠 Woningkwaliteit" value={wonScore} onChange={setWonScore}/>
                <SliderRow label="🌳 Leefbaarheid buurt" value={wonLeef} onChange={setWonLeef}/>
                <SliderRow label="🛒 Voorzieningen" value={wonVoorz} onChange={setWonVoorz}/>
                <G cols="1fr 1fr" gap={10}>
                  {[{l:"Gem. woningcijfer",v:`${wonGem.toFixed(1)}/10`,c:wonGem>=7?C.green:wonGem>=5?C.yellow:C.red},{l:"Waarde-effect",v:wonScore<5?"−5 tot −10%":wonScore<7?"−0 tot −3%":"Neutraal+",c:wonScore<5?C.red:wonScore<7?C.yellow:C.green},{l:"Verkoopbaarheid",v:wonGem>=7?"Goed":wonGem>=5?"Matig":"Moeizaam",c:wonGem>=7?C.green:wonGem>=5?C.yellow:C.red},{l:"Buurttrend",v:wonLeef>=7?"Positief":wonLeef>=5?"Stabiel":"Dalend",c:wonLeef>=7?C.green:wonLeef>=5?C.yellow:C.red}].map(k=>(
                    <div key={k.l} style={{background:C.s2,borderRadius:8,padding:10}}><div style={{fontSize:10,color:C.muted,marginBottom:3}}>{k.l}</div><div style={{fontSize:13,fontWeight:700,color:k.c,fontFamily:"'Lora',serif"}}>{k.v}</div></div>
                  ))}
                </G>
                {wonGem<5&&<Alert type="bad">Lage woningcijfer-score. Verhoogd risico op waardedaling. Houd extra buffer aan.</Alert>}
                {wonOk&&<Alert type="ok">Woningcijfer-scores zijn voldoende — positieve woonomgeving.</Alert>}
              </div>
            </div>

            {/* Hypotheekcijfer */}
            <div className="card" style={{background:C.surface,borderRadius:13,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{background:`${C.gold}12`,borderBottom:`1px solid ${C.border}`,padding:"13px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:19}}>📊</span><div><div style={{fontSize:14,fontWeight:600,color:C.text,fontFamily:"'Lora',serif"}}>Hypotheekcijfer.nl</div><div style={{fontSize:10,color:C.muted}}>hypotheekcijfer.nl — rente vergelijking</div></div></div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:17,fontWeight:700,fontFamily:"'Lora',serif",color:renteOk?C.green:C.red}}>Δ{renteDelta>0?"+":""}{renteDelta.toFixed(2)}%</span><Badge ok={renteOk}/><a href="https://www.hypotheekcijfer.nl" target="_blank" rel="noopener noreferrer" style={{background:`${C.gold}22`,color:C.gold,border:`1px solid ${C.gold}40`,borderRadius:7,padding:"4px 11px",fontSize:11,fontWeight:600,textDecoration:"none"}}>↗ Open</a></div>
              </div>
              <div style={{padding:18}}>
                <div style={{marginBottom:14}}>
                  <Field label="Laagste marktrente 10jr vast (van hypotheekcijfer.nl)" value={marktRente} onChange={setMarktRente} suf="%" step="0.05"/>
                </div>
                <G cols="repeat(auto-fit,minmax(120px,1fr))" gap={10}>
                  <KPI label="Uw rente" value={`${rente.toFixed(2)}%`} color={C.gold} small/>
                  <KPI label="Markt laagste" value={`${marktRente.toFixed(2)}%`} color={marktRente<rente?C.green:C.red} small/>
                  <KPI label="Verschil" value={`${renteDelta>0?"+":""}${renteDelta.toFixed(2)}%`} color={renteDelta>0.3?C.red:renteDelta>0?C.yellow:C.green} small/>
                  <KPI label="Besparing /jr" value={jaarBesp>0?`€${Math.round(jaarBesp).toLocaleString("nl-NL")}`:"Al optimaal"} color={jaarBesp>1500?C.green:C.sub} small/>
                </G>
                {jaarBesp>0&&<div style={{marginTop:12,padding:"10px 13px",background:`${C.green}15`,borderRadius:9,fontSize:12,color:C.green}}>💡 Oversluiten of onderhandelen levert <b>€{Math.round(jaarBesp*10).toLocaleString("nl-NL")}</b> op over 10 jaar.</div>}
                {renteDelta>0.8&&<Alert type="bad">Rente meer dan 0,8% boven markt. Contact opnemen met uw bank of oversluiten overwegen.</Alert>}
                {renteDelta>0.3&&renteDelta<=0.8&&<Alert type="warn">Rente boven markt. Bij renteverlenging scherp onderhandelen.</Alert>}
                {renteOk&&<Alert type="ok">Uw rente is concurrerend ten opzichte van de actuele markt.</Alert>}
              </div>
            </div>

            {/* Gecombineerd overzicht */}
            <Sec title="📋 Gecombineerd extern risicooverzicht" delay={0}>
              <div style={{display:"grid",gap:7,marginBottom:14}}>
                {[
                  {ico:"🌊",l:"Klimaatcijfer",score:`${klimGem.toFixed(1)}/10`,ok:klimOk,detail:`Water:${klimWater} · Overstr:${klimOverstr} · Droogte:${klimDroogte} · Hitte:${klimHitte}`},
                  {ico:"🏗️",l:"Funderingscijfer",score:`Label ${fundLabel}`,ok:fundOk,detail:fundHerstel>0?`Schatting herstelkosten: €${fundHerstel.toLocaleString("nl-NL")}`:"Geen directe kosten"},
                  {ico:"🏠",l:"Woningcijfer",score:`${wonGem.toFixed(1)}/10`,ok:wonOk,detail:`Woning:${wonScore} · Leef:${wonLeef} · Voorz:${wonVoorz}`},
                  {ico:"📊",l:"Hypotheekcijfer",score:`Δ${renteDelta>0?"+":""}${renteDelta.toFixed(2)}%`,ok:renteOk,detail:jaarBesp>0?`Besparing mogelijk: €${Math.round(jaarBesp).toLocaleString("nl-NL")}/jr`:"Rente is concurrerend"},
                ].map((s,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:C.s2,borderRadius:9,gap:8,flexWrap:"wrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{s.ico}</span><div><div style={{fontSize:12,fontWeight:600,color:C.text}}>{s.l}</div><div style={{fontSize:10,color:C.muted,marginTop:1}}>{s.detail}</div></div></div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:13,fontWeight:700,fontFamily:"'Lora',serif",color:s.ok?C.green:C.red}}>{s.score}</span><Badge ok={s.ok}/></div>
                  </div>
                ))}
              </div>
              <G cols="repeat(auto-fit,minmax(130px,1fr))" gap={10}>
                {[
                  {l:"Funderingsherstel",v:fundHerstel>0?`€${fundHerstel.toLocaleString("nl-NL")}`:"€0",c:fundHerstel>50000?C.red:fundHerstel>0?C.yellow:C.green},
                  {l:"Klimaat verzekering",v:klimGem>7?"Mogelijk onverzekerbaar":klimGem>5?"+€200–500/jr":"Normaal",c:klimGem>7?C.red:klimGem>5?C.yellow:C.green},
                  {l:"Waardecorrectie",v:`−€${Math.round((klimGem>5?ww*0.03:0)+(fundHerstel*0.3)+(wonScore<6?ww*0.04:0)).toLocaleString("nl-NL")}`,c:C.red},
                  {l:"Rentebesparing",v:jaarBesp>0?`€${Math.round(jaarBesp).toLocaleString("nl-NL")}/jr`:"n.v.t.",c:jaarBesp>0?C.green:C.sub},
                ].map(k=>(
                  <div key={k.l} style={{background:C.s2,borderRadius:9,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:14,fontWeight:700,color:k.c,fontFamily:"'Lora',serif"}}>{k.v}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:4}}>{k.l}</div>
                  </div>
                ))}
              </G>
            </Sec>
          </div>;
        })()}

        {/* ════ ACTIEPUNTEN ════════════════════════════════════════════════════════ */}
        {tab==="actiepunten"&&(
          <div style={{display:"grid",gap:14}}>

            {/* Prioriteitenmatrix */}
            <Sec title="🎯 Prioriteitenmatrix — wat moet u nú doen?" delay={0}>
              {[
                {prio:"kritiek",items:c.scenarios.filter(s=>!s.ok&&s.prio==="kritiek"),color:C.red,desc:"Direct actie vereist — groot financieel risico"},
                {prio:"hoog",items:c.scenarios.filter(s=>!s.ok&&s.prio==="hoog"),color:C.orange,desc:"Aanpakken binnen 3 maanden"},
                {prio:"middel",items:c.scenarios.filter(s=>!s.ok&&s.prio==="middel"),color:C.yellow,desc:"Plan voor de komende 6–12 maanden"},
                {prio:"laag",items:c.scenarios.filter(s=>!s.ok&&s.prio==="laag"),color:C.sub,desc:"Op termijn verbeteren"},
              ].filter(g=>g.items.length>0).map(g=>(
                <div key={g.prio} style={{marginBottom:16}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <Prio level={g.prio}/><span style={{fontSize:12,color:C.sub}}>{g.desc}</span>
                  </div>
                  <div style={{display:"grid",gap:6}}>
                    {g.items.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 13px",background:C.s2,borderRadius:9,border:`1px solid ${g.color}22`}}>
                        <span style={{fontSize:16}}>{s.ico}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:600,color:C.text}}>{s.l}</div>
                          <div style={{fontSize:10,color:C.muted,marginTop:2}}>{s.wq!==null?`Woonquote: ${pct(s.wq)} — `:""}Actie vereist</div>
                        </div>
                        <Badge ok={false}/>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              {c.risicoCount===0&&<Alert type="ok">Uitstekend! Alle scenario's zijn in orde. Voer jaarlijks een hercheck uit.</Alert>}
            </Sec>

            {/* Concrete acties */}
            <Sec title="✅ Concrete actie-checklist" delay={50}>
              {[
                {check:orv1==="nee"&&ink2>0,l:"Sluit een ORV af voor partner 1",detail:`Min. ${€(c.rsTotaal*0.7)} — kost ca. €10–30/mnd`,prio:"kritiek"},
                {check:orv2==="nee"&&ink2>0,l:"Sluit een ORV af voor partner 2",detail:`Min. ${€(c.rsTotaal*0.5)} — kost ca. €8–25/mnd`,prio:"hoog"},
                {check:aov==="nee"&&(dv1==="zzp"||dv1==="flex"),l:"Sluit een AOV af (ZZP/flex — urgent!)",detail:"Geen WIA-recht. AOV ~€120–300/mnd",prio:"kritiek"},
                {check:aov==="nee"&&dv1==="vast",l:"Overweeg een AOV aanvullend op WIA",detail:"WIA dekt maar 70% — AOV vult aan",prio:"hoog"},
                {check:c.bufMnd<3,l:"Bouw noodbuffer op tot minimaal 3 maanden",detail:`Nog ${€(Math.max(0,c.mL*3-c.bufTot))} sparen`,prio:"kritiek"},
                {check:c.bufMnd>=3&&c.bufMnd<6,l:"Vergroot buffer naar 6 maanden woonlasten",detail:`Nog ${€(Math.max(0,c.mL*6-c.bufTot))} sparen`,prio:"middel"},
                {check:c.aflVrijRisico,l:"Maak plan voor aflossingsvrij deel",detail:`${€(aflVrij)} moet bij einde looptijd afgelost`,prio:"hoog"},
                {check:c.pensWq>38&&c.rsPensioen>0,l:"Start met extra aflossen voor pensioen",detail:`Restschuld op pensioen: ${€(c.rsPensioen)}`,prio:"hoog"},
                {check:c.nvpDelta>300,l:"Bouw renteherziening-buffer op",detail:`Last stijgt ${€(c.nvpDelta)}/mnd over ${Math.max(0,rvp-betaald)} jaar`,prio:"middel"},
                {check:c.nhgMog&&nhg==="nee",l:"Check of u NHG kunt aanvragen",detail:"Hypotheek valt onder €435k grens — rentekorting ~0.4%",prio:"middel"},
                {check:!["A++","A+","A","B","C"].includes(energieLabel),l:"Verduurzaam de woning",detail:`Label ${energieLabel} kost ${€(c.energieExtra)}/mnd extra`,prio:"middel"},
                {check:c.wqBruto>42,l:"Verlaag de hypotheeklast (extra aflossen/oversluiten)",detail:`Woonquote ${pct(c.wqBruto)} overschrijdt 42% norm`,prio:"hoog"},
                {check:c.stressWq>55,l:"Verlaag renterisico voor volgende rentevaste periode",detail:`Bij ${stressRente}% rente: woonquote ${pct(c.stressWq)}`,prio:"middel"},
                {check:c.box3Btg>1000,l:"Overweeg box 3 optimalisatie",detail:`${€(c.box3Btg)}/jr belasting — evt. vermogen naar groene fondsen`,prio:"laag"},
              ].filter(a=>a.check).map((a,i)=>(
                <div key={i} style={{display:"flex",gap:10,padding:"10px 13px",background:C.s2,borderRadius:9,marginBottom:7,alignItems:"flex-start"}}>
                  <span style={{fontSize:16,marginTop:1}}>☐</span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><span style={{fontSize:12,fontWeight:600,color:C.text}}>{a.l}</span><Prio level={a.prio}/></div>
                    <div style={{fontSize:11,color:C.sub}}>{a.detail}</div>
                  </div>
                </div>
              ))}
              {[orv1==="nee"&&ink2>0,aov==="nee"&&(dv1==="zzp"||dv1==="flex"),c.bufMnd<3,c.wqBruto>42].every(v=>!v)&&
                <Alert type="ok">Alle urgente actiepunten zijn afgevinkt. Goed geregeld!</Alert>}
            </Sec>

            {/* Tijdlijn */}
            <Sec title="📅 Financiële tijdlijn" delay={100}>
              <div style={{position:"relative",paddingLeft:24}}>
                <div style={{position:"absolute",left:8,top:0,bottom:0,width:2,background:C.border,borderRadius:2}}/>
                {[
                  {jaar:0,l:"Vandaag",sub:`Restschuld: ${€(c.rsTotaal)} · Woonquote: ${pct(c.wqBruto)}`,color:C.gold},
                  ...(rvp-betaald>0?[{jaar:rvp-betaald,l:`Renteverlenging (${new Date().getFullYear()+rvp-betaald})`,sub:`Restschuld: ${€(c.rsNvp)} · Verwachte nieuwe rente: ${nieuweRente}%`,color:c.nvpDelta>200?C.red:C.yellow}]:[]),
                  ...(erfpacht==="ja"&&epHerziening>0?[{jaar:epHerziening,l:`Erfpacht herziening (${new Date().getFullYear()+epHerziening})`,sub:`Canon stijgt van ${€(c.canonMnd)} naar ${€(c.canonNieuw)}/mnd`,color:C.orange}]:[]),
                  ...(kinderen>0&&c.jaarTotStudie>0?[{jaar:c.jaarTotStudie,l:`Studie kinderen start (~${new Date().getFullYear()+c.jaarTotStudie})`,sub:`Kosten: ${€(c.studieKosten)}/mnd per kind`,color:C.purple}]:[]),
                  ...(c.jTotP>0?[{jaar:c.jTotP,l:`Pensioen (${new Date().getFullYear()+c.jTotP})`,sub:c.rsPensioen===0?`Hypotheek afgelost ✓`:`Restschuld: ${€(c.rsPensioen)} · Woonquote: ${pct(c.pensWq)}`,color:c.rsPensioen===0?C.green:c.pensWq>38?C.red:C.yellow}]:[]),
                  {jaar:lp-betaald,l:`Einde hypotheek (${new Date().getFullYear()+lp-betaald})`,sub:aflVrij>0?`Aflossingsvrij deel open: ${€(aflVrij)}`:"Hypotheek volledig afgelost",color:aflVrij>0?C.red:C.green},
                ].sort((a,b)=>a.jaar-b.jaar).map((e,i)=>(
                  <div key={i} style={{position:"relative",paddingLeft:20,paddingBottom:18}}>
                    <div style={{position:"absolute",left:-8,top:4,width:10,height:10,borderRadius:"50%",background:e.color,boxShadow:`0 0 8px ${e.color}66`}}/>
                    <div style={{fontSize:11,fontWeight:700,color:e.color}}>{e.jaar===0?"Nu":e.jaar<=1?`Over ${Math.round(e.jaar*12)} maanden`:`Over ${e.jaar} jaar`} — {e.l}</div>
                    <div style={{fontSize:11,color:C.sub,marginTop:2}}>{e.sub}</div>
                  </div>
                ))}
              </div>
            </Sec>

            {/* Jaarlijkse hercheck */}
            <Sec title="🔄 Jaarlijkse hercheck — wat controleren?" delay={150}>
              <div style={{display:"grid",gap:6}}>
                {["Actuele woningwaarde en LTV herberekenen","Controleer of NHG inmiddels mogelijk is (na dalende restschuld)","Vergelijk uw rente met de markt — oversluiten zinvol?","Update spaarbuffer aan de hand van nieuwe maandlasten","Herzie verzekeringsbedragen ORV/AOV na loonstijging","Check of aflossingsvrij deel nog past binnen uw situatie","Bereken effect van eventuele loonsverhogingen op woonquote","Controleer gemeentelijke lasten en opstalpremie voor aanpassing"].map((l,i)=>(
                  <div key={i} style={{display:"flex",gap:10,padding:"8px 12px",background:C.s2,borderRadius:8,fontSize:12,color:C.sub}}>
                    <span style={{color:C.teal}}>→</span>{l}
                  </div>
                ))}
              </div>
            </Sec>

          </div>
        )}

      </div>

      <div style={{borderTop:`1px solid ${C.border}`,padding:"11px 14px",textAlign:"center",fontSize:10,color:C.muted}}>
        ⚠️ Informatief hulpmiddel — geen financieel advies. Neem voor persoonlijk advies contact op met een AFM-geregistreerde hypotheekadviseur. Alle berekeningen zijn indicatief.
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
